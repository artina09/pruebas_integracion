name: CI — Build & Integration Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# "Añade badges dinámicos" hay que darle permisos de escritura, porque por defecto no puede modificar
permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  build: # siempre igual
    runs-on: ubuntu-latest

    steps: # los dos primero siempre igual
      # Descargar el codigo
      - name: Checkout
        uses: actions/checkout@v4

      # Configurar java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Dar permisos a maven
      - name: Execute permission to mvnw
        run: chmod +x mvnw

      # Compilar el proyecto
      - name: Build
        run: ./mvnw compile --no-transfer-progress

      # Ejecutar pruebas de integracion
      - name: Run tests
        run: ./mvnw verify --no-transfer-progress

      # Generar informe de pruebas
      - name: Tests report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test results
          path: '**/target/*-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      # Subir los XML como artefactos descargables
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: '**/target/surefire-reports/TEST-*.xml,**/target/failsafe-reports/TEST-*.xml'
          retention-days: 7

      # Generar el badge de cobertura
      - name: Generate JaCoCo Badge
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: "**/jacoco.csv"

      - name: Log coverage percentage
        run: |
          echo "coverage = ${{ steps.jacoco.outputs.coverage }}"
          echo "branch coverage = ${{ steps.jacoco.outputs.branches }}"

      - name: Commit the badge (if it changed)
        run: |
          if [[ `git status --porcelain` ]]; then
            git config --global user.name 'Artina Aradnasab'
            git config --global user.email 'artina.uma@uma.es'
            git add -A
            git commit -m "Autogenerated JaCoCo coverage badge"
            git push
          fi








        


      
